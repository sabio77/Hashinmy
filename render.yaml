services:
  - type: web
    name: hashinmy-immersive-static-site
    runtime: static
    buildCommand: npm run check
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=3600, must-revalidate
      - path: /css/*
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /js/*
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /textX/*
        name: Cache-Control
        value: no-store, no-cache, must-revalidate, max-age=0
      - path: /textX/*.json
        name: Content-Type
        value: application/json; charset=utf-8
      - path: /textX/seo/*.json
        name: Content-Type
        value: application/json; charset=utf-8
      - path: /llms.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /llms.txt
        name: Cache-Control
        value: public, max-age=300, must-revalidate
      - path: /robots.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /404.html
        name: X-Robots-Tag
        value: noindex, nofollow, noarchive
    routes:

      # Accesibilidad directa: cada URL pública sin barra final redirige a su HTML estático canónico.
      # Esto evita Not Found al pegar rutas visibles como /es, /es/productos o fichas SEO sin slash.
      - type: redirect
        source: /es
        destination: /es/
